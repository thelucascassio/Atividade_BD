{% extends "base.html" %}
{% load humanize %}

{% block titulo_pagina %}
    <h2>Quantidade de campi por UF</h2>
{% endblock %}

{% block conteudo %}


<div class="dashboard">
    {% for item in campi_por_uf %}
        <div class="card">
            <h3> {{ item.uf }}</h3>
            <p>{{ item.qtd_campi|intcomma }} </p>
        </div>
    {% empty %}
        <p>Nenhum dado de campi por UF disponível.</p>
    {% endfor %}
</div>

{% endblock %}
